actions:
  - name: initiatePayment
    definition:
      kind: synchronous
      handler: http://host.docker.internal:8081/actions/initiate-payment
    permissions:
      - role: user
  - name: login
    definition:
      kind: synchronous
      handler: http://host.docker.internal:8081/login
      request_transform:
        body:
          action: transform
          template: |-
            {
              "email": "{{$body.input.user.email}}",
              "password": "{{$body.input.user.password}}"
            }
        template_engine: Kriti
        version: 2
    permissions:
      - role: anonymous
      - role: user
  - name: signup
    definition:
      kind: synchronous
      handler: http://host.docker.internal:8081/signup
      request_transform:
        body:
          action: transform
          template: |-
            {
              "name": "{{$body.input.user.name}}",
              "email": "{{$body.input.user.email}}",
              "password": "{{$body.input.user.password}}"
            }
        template_engine: Kriti
        version: 2
    permissions:
      - role: anonymous
custom_types:
  enums: []
  input_objects:
    - name: LoginInput
    - name: SignupInput
  objects:
    - name: LoginResponse
    - name: SignupResponse
    - name: User
    - name: PaymentInitResponse
  scalars: []
