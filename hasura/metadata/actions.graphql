type Mutation {
  createBooking(
    schedule_id: uuid!
    schedule_seat_ids: [uuid!]!
  ): BookingResponse!
}

type Mutation {
  initiatePayment(
    booking_reference: String!
  ): PaymentInitResponse
}

type Mutation {
  login(
    user: LoginInput!
  ): LoginResponse!
}

type Mutation {
  signup(
    user: SignupInput!
  ): SignupResponse!
}

type Mutation {
  uploadImage(
    base64: String!
    filename: String!
    content_type: String!
  ): UploadImageResponse!
}

input LoginInput {
  email: String!
  password: String!
}

input SignupInput {
  name: String!
  email: String!
  password: String!
}

type LoginResponse {
  message: String!
  token: String!
  type: String!
  expires_in: Int!
}

type SignupResponse {
  message: String!
  user: User!
}

type User {
  id: String!
  name: String!
  email: String!
  role: String!
}

type PaymentInitResponse {
  checkoutUrl: String!
  txRef: String!
}

type BookingResponse {
  success: Boolean!
  message: String!
  booking_reference: String
  ticket_ids: [uuid!]
  payment_id: uuid
  amount: Int
}

type UploadImageResponse {
  success: Boolean!
  message: String!
  url: String
}

