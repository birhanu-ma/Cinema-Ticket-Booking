table:
  name: schedules
  schema: public
object_relationships:
  - name: hall
    using:
      manual_configuration:
        column_mapping:
          hall_id: id
        insertion_order: null
        remote_table:
          name: cinema_halls
          schema: public
  - name: movie
    using:
      foreign_key_constraint_on: movies_id
array_relationships:
  - name: bookmarks
    using:
      foreign_key_constraint_on:
        column: schedule_id
        table:
          name: bookmarks
          schema: public
  - name: schedule_seats
    using:
      foreign_key_constraint_on:
        column: schedule_id
        table:
          name: schedule_seats
          schema: public
  - name: tickets
    using:
      foreign_key_constraint_on:
        column: schedule_id
        table:
          name: tickets
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - price
        - format
        - language
        - created_at
        - end_time
        - start_time
        - updated_at
        - hall_id
        - id
        - movies_id
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - end_time
        - format
        - hall_id
        - id
        - language
        - movies_id
        - price
        - start_time
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
