table:
  name: movie_stars
  schema: public
object_relationships:
  - name: movie
    using:
      foreign_key_constraint_on: movie_id
  - name: star
    using:
      foreign_key_constraint_on: star_id
select_permissions:
  - role: user
    permission:
      columns:
        - created_at
        - updated_at
        - movie_id
        - star_id
      filter: {}
      allow_aggregations: true
    comment: ""
