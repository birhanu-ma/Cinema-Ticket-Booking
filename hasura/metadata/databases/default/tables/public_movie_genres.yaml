table:
  name: movie_genres
  schema: public
object_relationships:
  - name: genre
    using:
      foreign_key_constraint_on: genre_id
  - name: movie
    using:
      foreign_key_constraint_on: movie_id
select_permissions:
  - role: anonymous
    permission:
      columns:
        - created_at
        - updated_at
        - genre_id
        - movie_id
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - updated_at
        - genre_id
        - movie_id
      filter: {}
      allow_aggregations: true
    comment: ""
