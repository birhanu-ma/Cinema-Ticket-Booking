table:
  name: tickets
  schema: public
object_relationships:
  - name: schedule
    using:
      foreign_key_constraint_on: schedule_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: payments
    using:
      foreign_key_constraint_on:
        column: ticket_id
        table:
          name: payments
          schema: public
