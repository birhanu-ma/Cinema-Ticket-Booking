table:
  name: tickets
  schema: public
object_relationships:
  - name: schedule
    using:
      foreign_key_constraint_on: schedule_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: payments
    using:
      foreign_key_constraint_on:
        column: ticket_id
        table:
          name: payments
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - status
        - created_at
        - updated_at
        - id
        - schedule_id
        - user_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - status
        - created_at
        - updated_at
        - id
        - schedule_id
        - user_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - status
        - created_at
        - updated_at
        - id
        - schedule_id
        - user_id
      filter: {}
      check:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
