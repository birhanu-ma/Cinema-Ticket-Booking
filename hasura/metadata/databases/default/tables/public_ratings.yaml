table:
  name: ratings
  schema: public
object_relationships:
  - name: movie
    using:
      foreign_key_constraint_on: movie_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - rating
        - created_at
        - updated_at
        - id
        - movie_id
        - user_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - rating
        - created_at
        - updated_at
        - id
        - movie_id
        - user_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - rating
        - created_at
        - updated_at
        - id
        - movie_id
        - user_id
      filter: {}
      check:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
