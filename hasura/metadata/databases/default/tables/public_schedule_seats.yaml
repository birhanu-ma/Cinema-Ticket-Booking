table:
  name: schedule_seats
  schema: public
object_relationships:
  - name: schedule
    using:
      foreign_key_constraint_on: schedule_id
  - name: seat
    using:
      foreign_key_constraint_on: seat_id
select_permissions:
  - role: user
    permission:
      columns:
        - is_available
        - created_at
        - locked_at
        - id
        - locked_by
        - schedule_id
        - seat_id
      filter: {}
      allow_aggregations: true
    comment: ""
