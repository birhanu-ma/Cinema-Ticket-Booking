table:
  name: users
  schema: public
array_relationships:
  - name: bookmarks
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: bookmarks
          schema: public
  - name: payments
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: payments
          schema: public
  - name: ratings
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: ratings
          schema: public
  - name: tickets
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: tickets
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - created_at
        - email
        - id
        - name
        - updated_at
      filter:
        id:
          _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - email
        - name
      filter: {}
      check:
        id:
          _eq: X-Hasura-User-Id
    comment: ""
