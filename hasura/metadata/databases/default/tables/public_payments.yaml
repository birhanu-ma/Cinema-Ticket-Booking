table:
  name: payments
  schema: public
object_relationships:
  - name: ticket
    using:
      foreign_key_constraint_on: ticket_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: user
    permission:
      columns:
        - status
        - transaction_ref
        - created_at
        - updated_at
        - id
        - ticket_id
        - user_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
